name: Build and Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: azure-production-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_CLIENT_ID: e2900889-8d66-4f1f-94a2-1c08e377f660
  AZURE_TENANT_ID: 2204f1a7-d148-4edd-9f06-57012f973b70
  AZURE_SUBSCRIPTION_ID: 477a9591-e616-49d0-972b-b2e53c906ad1
  AZURE_RESOURCE_GROUP: myportfolio-rg
  AZURE_CONTAINER_APP_NAME: myportfolio
  AZURE_ACR_NAME: myportfolioregistry
  ACR_LOGIN_SERVER: myportfolioregistry.azurecr.io
  IMAGE_NAME: myportfolio

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_BASE_PATH: "/"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: image
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Docker login to ACR
        run: az acr login --name "$AZURE_ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/azure/Dockerfile
          push: true
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_SUPABASE_PROJECT_ID=${{ secrets.VITE_SUPABASE_PROJECT_ID }}
            VITE_BASE_PATH=/
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Container App
        run: |
          az containerapp update \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ steps.image.outputs.tag }}" \
            --revision-suffix "${{ steps.image.outputs.tag }}"

      - name: Verify deployment
        run: |
          az containerapp revision list \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "[].{name:name,active:properties.active,state:properties.runningState,traffic:properties.trafficWeight}" \
            --output table

          # Fetch FQDN dynamically and verify the container app directly (bypassing DNS propagation/caching issues)
          FQDN=$(az containerapp show \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)
          
          echo "Verifying container app directly via FQDN: https://$FQDN/"
          curl --fail --show-error --location --head "https://$FQDN/"

          # Also attempt to verify the custom domain, but do not fail the workflow if it fails to resolve (due to DNS propagation)
          echo "Verifying custom domain: https://portfolio.virtualgyans.tech/"
          curl --show-error --location --head "https://portfolio.virtualgyans.tech/" || echo "Warning: Custom domain could not be resolved or reached. This may be due to DNS propagation."
